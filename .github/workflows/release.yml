name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re-)build, e.g. v0.1.1'
        required: true
        type: string

# tauri-action uploads the built .dmg / updater artifacts to the
# release tagged `tagName`; that's a write op on the Releases API and
# needs `contents: write`. Without it GitHub returns "Resource not
# accessible by integration" on the upload step.
permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-latest

    steps:
      # On `workflow_dispatch` we explicitly check out the requested tag;
      # on `push: tags/v*` we just take whatever ref triggered the run.
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      # No `version:` here — root package.json's `packageManager` field
      # is the source of truth; pnpm/action-setup@v4 errors if both are set.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-apple-darwin,x86_64-apple-darwin'

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/claude-profiles/src-tauri -> target'

      - name: Restore turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      # When APPLE_CERTIFICATE is set, import it into a keychain AND
      # propagate every Apple-signing env var to subsequent steps via
      # $GITHUB_ENV. When it isn't set, propagate *nothing* — Tauri's
      # bundler reads APPLE_CERTIFICATE directly and tries to run
      # `security import` on whatever's there, so an empty value still
      # triggers the codesign path and fails. The all-or-nothing flow
      # produces a valid unsigned build when secrets are missing.
      - name: Import Apple Developer Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "::notice::APPLE_CERTIFICATE not set — building unsigned. Users will see a Gatekeeper warning."
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          # Propagate to subsequent steps only when signing is enabled.
          {
            echo "APPLE_CERTIFICATE=$APPLE_CERTIFICATE"
            echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
            echo "APPLE_ID=$APPLE_ID"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
          } >> "$GITHUB_ENV"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # APPLE_* vars are intentionally NOT listed here — they're
          # injected by the previous step via $GITHUB_ENV only when
          # APPLE_CERTIFICATE is configured.
        with:
          projectPath: apps/claude-profiles
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: 'claude-profiles ${{ inputs.tag || github.ref_name }}'
          releaseBody: 'See [CHANGELOG.md](./apps/claude-profiles/CHANGELOG.md) for details. Auto-update will pick this up on the next 6-hour check.'
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin

      # release-please publishes the GitHub Release as a draft so users
      # never see a release without its .dmg attached. Flip it to
      # published only after tauri-action successfully uploaded every
      # asset — implicit `if: success()` skips this on failure, leaving
      # the broken release as a draft for inspection.
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ inputs.tag || github.ref_name }}" --draft=false
