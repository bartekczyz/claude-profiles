name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/claude-profiles/src-tauri -> target'

      - name: cargo fmt --check
        run: cargo fmt --check
        working-directory: apps/claude-profiles/src-tauri

      - name: cargo clippy
        run: cargo clippy -- -D warnings
        working-directory: apps/claude-profiles/src-tauri

      - name: cargo test
        # State-touching tests are serialised via the cfg(test) tempdir in
        # paths.rs, so --test-threads=1 is no longer strictly required.
        # Kept as a safety net.
        run: cargo test -- --test-threads=1
        working-directory: apps/claude-profiles/src-tauri

  frontend:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Restore turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm turbo run typecheck

      - name: biome check
        run: pnpm biome check

      - name: test
        run: pnpm turbo run test
