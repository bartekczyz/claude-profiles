pre-commit:
  jobs:
    - name: biome check
      run: pnpm biome check --staged --no-errors-on-unmatched --reporter=summary
    - name: rustfmt
      glob: "src-tauri/**/*.rs"
      run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

pre-push:
  jobs:
    - name: cargo clippy
      run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
    - name: cargo test
      run: cargo test --manifest-path src-tauri/Cargo.toml
    - name: typecheck
      run: pnpm typecheck
