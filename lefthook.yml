pre-commit:
  jobs:
    - name: biome check
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css}"
      run: pnpm biome check --staged --no-errors-on-unmatched --reporter=summary

    - name: rustfmt
      glob: "apps/claude-profiles/src-tauri/**/*.rs"
      run: PATH="$HOME/.cargo/bin:$PATH" cargo fmt --manifest-path apps/claude-profiles/src-tauri/Cargo.toml --all -- --check

pre-push:
  jobs:
    - name: typecheck
      glob: "{apps,packages}/**/*.{ts,tsx,json}"
      run: pnpm turbo run typecheck

    - name: cargo clippy
      glob: "apps/claude-profiles/src-tauri/**/*.{rs,toml}"
      run: PATH="$HOME/.cargo/bin:$PATH" cargo clippy --manifest-path apps/claude-profiles/src-tauri/Cargo.toml --all-targets -- -D warnings

    - name: cargo test
      glob: "apps/claude-profiles/src-tauri/**/*.{rs,toml}"
      run: PATH="$HOME/.cargo/bin:$PATH" cargo test --manifest-path apps/claude-profiles/src-tauri/Cargo.toml
